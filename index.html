     <script>
            
document.addEventListener("DOMContentLoaded", () => {

    const verseElement = document.getElementById("bible-verse");

    fetch("https://labs.bible.org/api/?passage=random&type=json")
        .then(response => response.json())
        .then(data => {
            const verse = `${data[0].bookname} ${data[0].chapter}:${data[0].verse} - "${data[0].text}"`;
            verseElement.textContent = verse;
        })
        .catch(() => {
            verseElement.textContent = "Unable to load verse. Please refresh.";
        });

});
</script>
